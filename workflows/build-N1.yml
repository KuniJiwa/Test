      builder_name:
        description: '设置打包作者的名称'
        required: true
        default: 'KuniJiwa'
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          mkdir -p bin/targets/armsr/armv8/

      - name: Building N1 ImmortalWrt rootfs LuCI ${{ inputs.luci_version }} | Kernel ${{ inputs.kernel_version }}
        run: |
          echo "✅ 使用 ImageBuilder 构建 rootfs"
          docker run --rm -i \
            --user root \
            -v ${{ github.workspace }}/bin:/home/build/immortalwrt/bin \
            -v ${{ github.workspace }}/files:/home/build/immortalwrt/files \
            -v ${{ github.workspace }}/n1/arch.conf:/home/build/immortalwrt/files/etc/opkg/arch.conf \
            -v ${{ github.workspace }}/shell:/home/build/immortalwrt/shell \
            -v ${{ github.workspace }}/n1/build.sh:/home/build/immortalwrt/build.sh \
            -e PROFILE=generic \
            -e PLUGINS="${{ inputs.plugins }}" \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e ROOTFS_PARTSIZE=${{ inputs.rootfs_size }} \
            immortalwrt/imagebuilder:armsr-armv8-openwrt-${{ inputs.luci_version }} \
            /bin/bash -c "
              { grep '^arch ' /home/build/immortalwrt/files/etc/opkg/arch.conf; cat repositories.conf; } > /tmp/repos.conf && mv /tmp/repos.conf repositories.conf
              bash /home/build/immortalwrt/build.sh
            "

      - name: Remove redundancy
        run: bash shell/cleanup-packages.sh

      - name: Diagnose firmware
        run: bash shell/check-firmware.sh || true

      - name: 查找rootfs.tar.gz所在路径
        id: find_rootfs
        run: |
          ROOTFS_FILE=$(find bin/targets/armsr/armv8/ -type f -name "*rootfs.tar.gz" | head -1)
          [ -f "$ROOTFS_FILE" ] || exit 1
          echo "🔍 Rootfs: $ROOTFS_FILE"
          echo "file=$ROOTFS_FILE" >> $GITHUB_OUTPUT

      - name: Package armsr-armv8 as ImmortalWrt for N1
        uses: KuniJiwa/flippy-openwrt-actions@custom
        env:
          OPENWRT_ARMVIRT: ${{ steps.find_rootfs.outputs.file }}
          PACKAGE_SOC: s905d
          KERNEL_VERSION_NAME: ${{ inputs.kernel_version }}
          KERNEL_AUTO_LATEST: false
          WHOAMI: ${{ inputs.builder_name }}
          APPLY_CUSTOM_PATCH: true

      - name: Rename .img.gz file
        run: |
          OUTPUT_DIR="${PACKAGED_OUTPUTPATH:-/opt/openwrt_packit/output}"
          IMG_FILE=$(ls ${OUTPUT_DIR}/*.img.gz | head -n1)
          KERNEL_VERSION=$(echo "$IMG_FILE" | grep -oP 'k\d+\.\d+\.\d+')
          LUCI_VERSION="${{ inputs.luci_version }}"
          TIMESTAMP=$(date +"%Y%m%d-%H%M")
          mv "$IMG_FILE" "${OUTPUT_DIR}/immortalwrt-${LUCI_VERSION}-phicomm-n1-btrfs-${KERNEL_VERSION}-${TIMESTAMP}.img.gz"
          ROOTFS_FILE=$(find "${GITHUB_WORKSPACE}/bin/targets/armsr/armv8/" -type f -name "*rootfs.tar.gz" | head -n1)
          if [ -f "$ROOTFS_FILE" ]; then
            cp "$ROOTFS_FILE" "${OUTPUT_DIR}/immortalwrt-${LUCI_VERSION}-phicomm-n1-${TIMESTAMP}-rootfs.tar.gz"
          fi

      - name: Upload firmware to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          tag_name: phicomm-n1
          name: ImmortalWrt for Phicomm N1
          body_path: ${{ github.workspace }}/n1/info.md
          files: |
            ${{ env.PACKAGED_OUTPUTPATH }}/immortalwrt-*.img.gz
            ${{ env.PACKAGED_OUTPUTPATH }}/immortalwrt-*-rootfs.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}