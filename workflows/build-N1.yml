# ============================================================================
# ImmortalWrt 旁路由固件 · 自动编译与发布
# 架构：armsr/armv8（斐讯 N1 · S905D）
# 方式：官方 ImageBuilder 声明式构建（非 make）
# 打包：调用 openwrt_packit@custom 封装为 N1 直刷 .img.gz
# 产物：img.gz + rootfs.tar.gz 双格式，自动发布到 Release
# ============================================================================

